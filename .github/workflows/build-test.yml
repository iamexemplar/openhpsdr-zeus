name: Build and Test

on:
  push:
    branches: [main, develop, experimental]
  pull_request:
    branches: [main, develop, experimental]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zeus-web/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore Zeus.slnx

      - name: Build .NET solution
        run: dotnet build Zeus.slnx --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test Zeus.slnx --configuration Release --no-build --verbosity normal

      - name: Install frontend dependencies
        run: npm ci
        working-directory: zeus-web

      - name: Lint frontend
        run: npm run lint
        working-directory: zeus-web

      - name: Type-check frontend
        run: npm run typecheck
        working-directory: zeus-web
        continue-on-error: true  # Type checking may fail due to missing @types packages in CI

      - name: Run frontend tests
        run: npm test
        working-directory: zeus-web

      - name: Build frontend
        run: npm run build
        working-directory: zeus-web

      - name: Verify wwwroot output
        shell: bash
        run: |
          # Vite outputs into Zeus.Server.Hosting/wwwroot since the
          # Zeus.Server.Hosting library refactor; both Zeus.Server and
          # Zeus.Desktop pick the assets up via Content propagation.
          if [ ! -f "Zeus.Server.Hosting/wwwroot/index.html" ]; then
            echo "Error: Frontend build did not produce Zeus.Server.Hosting/wwwroot/index.html"
            exit 1
          fi
          echo "Frontend build successful"

      - name: Verify Windows installer publish payload
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet publish OpenhpsdrZeus/OpenhpsdrZeus.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:VersionPrefix=0.0.0 `
            -p:VersionSuffix=ci `
            -p:DebugType=embedded `
            -p:DebugSymbols=false
          ./tools/verify-windows-installer-payload.ps1 `
            -PublishDir "OpenhpsdrZeus/bin/Release/net10.0/win-x64/publish" `
            -Arch x64
